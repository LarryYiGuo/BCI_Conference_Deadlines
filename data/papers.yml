    year: 2023
    tag: 'CN'
    desc: '用Transformer结合域对抗适应做跨被试EEG情绪识别,采用真实油画刺激范式,缓解个体差异分布偏移。'
  - title: 'Few-shot Class-incremental Learning for EEG-based Emotion Recognition'
