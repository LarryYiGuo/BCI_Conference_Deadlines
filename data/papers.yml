    year: 2022
    tag: 'CN'
    desc: '把小样本类增量学习引入EEG情绪识别,使模型能在少量样本下持续学习新情绪类别而不遗忘旧类。'
  - title: 'Measuring Decision Confidence Levels from EEG Using a Spectral-Spatial-Temporal Adaptive Graph Convolutional Neural Network'
