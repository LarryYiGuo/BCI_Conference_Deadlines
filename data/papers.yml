    year: 2022
    tag: 'CN'
    desc: '用谱-空-时自适应图卷积网络从EEG解码决策置信度,把BCI从情绪扩展到认知状态评估。'
  - title: 'Naturalistic Emotion Recognition Using EEG and Eye Movements'
    group: '吕宝粮/郑伟龙组, 上海交通大学 BCMI (Zhang, Zheng, Lu)'
    year: 2021
    tag: 'CN'
    desc: '在自然观影范式下融合EEG与眼动多模态信号做情绪识别,推动aBCI走向真实场景。'
