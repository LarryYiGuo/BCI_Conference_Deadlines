    year: 2025
    tag: 'CN'
    desc: 'EEG睡眠分期个性化适应。Source-free UDA——目标域适应时无需访问源域数据。'
  - title: 'Generalizable Sleep Staging via Multi-level Domain Alignment'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    year: 2024
    tag: 'CN'
    desc: '多层级domain alignment用于跨数据集睡眠分期泛化。CCF-A录用，CBraMod前作。'
  - title: 'BrainVis: Exploring the Bridge between Brain and Visual Signals via Image Reconstruction'
