cvpr27:
  - title: 'Neuro-3D: Towards 3D Visual Decoding from EEG Signals'
    group: 'Zhanqiang Guo 等 / 清华大学(gzq17 团队)'
    year: 2025
    tag: 'CN'
    desc: '首个从 EEG 解码 3D 视觉感知的工作,发布 EEG-3D 数据集,用扩散式彩色点云解码器同时恢复 3D 物体的形状与颜色,把脑-视觉解码从 2D 图像推进到 3D。'
  - title: 'MindBridge: A Cross-Subject Brain Decoding Framework'
    group: 'Shizun Wang, Songhua Liu, Zhenxiong Tan, Xinchao Wang / 新加坡国立大学'
    year: 2024
    tag: 'CN'
    desc: 'CVPR 2024 Highlight。打破''一人一模型''范式,用单一模型实现跨被试脑解码:生物启发的聚合函数+循环 fMRI 重建,新被试仅需少量数据即可超过专用模型。'
  - title: 'Psychometry: An Omnifit Model for Image Reconstruction from Human Brain Activity'
    group: 'Ruijie Quan, Wenguan Wang, Zhibo Tian, Fan Ma, Yi Yang / 浙江大学'
    year: 2024
    tag: 'CN'
    desc: '用 Omni 混合专家(MoE)同时捕捉跨被试共性与个体差异,配合 Ecphory 检索增强推理,从不同被试 fMRI 重建高保真图像,刷新 SOTA。'
  - title: 'Brain Decodes Deep Nets'
    group: 'Huzheng Yang, James Gee, Jianbo Shi / 宾夕法尼亚大学'
    year: 2024
    tag: 'INTL'
    desc: '反向利用脑编码:用预测 fMRI 的任务把大型视觉模型''画''到大脑皮层上(FactorTopy),揭示不同训练方法导致的层级组织差异,是脑科学与可解释性的有趣交叉。'
  - title: 'Seeing Beyond the Brain: Conditional Diffusion Model with Sparse Masked Modeling for Vision Decoding (MinD-Vis)'
    group: 'Zijiao Chen, Jiaxin Qing, Juan Helen Zhou 等 / 新加坡国立大学(NUS)、香港中文大学'
    year: 2023
    tag: 'CN'
    desc: '脑-视觉解码的奠基性工作之一:用掩码脑建模(MBM)预训练 fMRI 编码器,再用双重条件扩散模型从大脑活动重建出语义一致的高质量图像,引爆了 fMRI-to-image 这条赛道。'
  - title: 'High-Resolution Image Reconstruction with Latent Diffusion Models from Human Brain Activity'
    group: 'Yu Takagi, Shinji Nishimoto / 大阪大学、NICT(日本)'
    year: 2023
    tag: 'Highlight'
    desc: '首次直接用 Stable Diffusion 从 NSD 数据集的 fMRI 重建自然图像,方法极简(线性映射到潜空间+文本/图像双路条件),成为该领域被引最多的基线之一。'

iccv27:
