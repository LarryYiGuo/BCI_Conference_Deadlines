    tag: 'Workshop'
    desc: 'Subject-independent MI分类，BCI Competition IV 2a/2b验证。HBAI workshop是IJCAI上BCI主题主要聚集地。'

kdd27:
  - title: 'Brant-X: A Unified Physiological Signal Alignment Framework'
