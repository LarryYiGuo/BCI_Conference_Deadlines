icdm27:
  - title: 'SplitSEE: A Splittable Self-supervised Framework for Single-Channel EEG Representation Learning'
    group: 'Rikuto Kotoge, Zheng Chen 等/大阪大学 (Sakurai/Matsubara Lab)'
    year: 2024
    tag: 'INTL'
    desc: '针对单通道EEG的可拆分自监督框架,用两个领域专属模块分别学时域/频域表示并以聚类损失对齐,缓解时频权衡,可扩展到癫痫发作预测等任务。'

sdm27:
  - title: 'A Two-View EEG Representation for Brain Cognition by Composite Temporal-Spatial Contrastive Learning'
    group: 'Zheng Chen, Lingwei Zhu, Haohui Jia, Takashi Matsubara/大阪大学'
    year: 2023
    tag: 'INTL'
    desc: '用复合时空对比学习构建EEG双视图表示,面向脑认知任务(睡眠分期、致命性癫痫发作预测),为下游监督学习提供高质量特征。'

ijcnn27:
  - title: 'Adaptive Hierarchical Graph Convolutional Network for EEG Emotion Recognition'
    group: '郑文明组, 东南大学 (Xue, Zheng, Zong, Chang, Jiang)'
    year: 2022
    tag: 'CN'
    desc: '自适应分层图卷积网络,用可学习池化自动划分脑区并建模通道/脑区间功能连接,代表性图神经网络EEG情绪工作(IEEE Xplore已验证)。'

iconip27:
  - title: 'Multi-View Fusion Transformer for Emotion Recognition Under Sleep Deprivation'
