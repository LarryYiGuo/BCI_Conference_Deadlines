    year: 2025
    tag: 'INTL'
    desc: '系统探索多模态大模型的视觉特征空间用于神经解码,把脑信号对齐到更丰富的视觉特征,提升 fMRI 多模态(图像/描述/细粒度理解)解码效果。'
  - title: 'Beyond Brain Decoding: Visual-Semantic Reconstructions to Mental Creation Extension (NeuroCreat)'
    group: 'Jing 等(NeuroCreat 框架)/ 中国高校(具体单位待核实)'
    year: 2025
    tag: 'CN'
    desc: '把脑解码从''重建所见''推向''脑中创造'':提出 NeuroCreat 框架做视觉-语义重建并扩展到心理创造任务,探索创造性多模态脑解码的新方向。'

eccv28:
  - title: 'UMBRAE: Unified Multimodal Brain Decoding'
    group: 'Weihao Xia, Raoul de Charette, Cengiz Öztireli, Jing-Hao Xue / 伦敦大学学院(UCL)、Inria、剑桥大学'
    year: 2024
    tag: 'INTL'
