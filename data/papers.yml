# BCI Papers · 各会议/期刊近年 BCI/EEG 论文索引 / per-venue recent-paper index
# ─────────────────────────────────────────────────────────────
# 整理自「ML/AI 顶会论文清单」+ 多智能体并行检索(会议各族系 + 期刊各族系)。
# 近五年(2021+)有价值的论文。按 会议id / 期刊id 归组;每篇:title/group/year/tag/desc。
# 网站顶部「论文」开关在会议与期刊视图均可展示;每篇标题链到 Google Scholar 搜索。
# ─────────────────────────────────────────────────────────────

# ════════ 会议 conferences ════════

neurips27:
  - title: 'CSBrain: A Cross-scale Spatiotemporal Brain Foundation Model for EEG Decoding'
    group: '上海AI Lab + 中山大学'
    year: 2025
    tag: 'Spotlight'
    desc: '指出现有foundation model继承自NLP/CV的"scale-agnostic dense modeling"忽略了神经活动的cross-scale结构。多尺度空间-时间联合建模。'
  - title: 'NeurIPT: Foundation Model for Neural Interfaces'
    group: '海外 EEG-based Neural Interfaces foundation model'
    year: 2025
    tag: 'INTL'
    desc: 'Amplitude-Aware Masked Pretraining (AAMP) + Mixture-of-Experts处理多电极配置。专注neural interface多任务泛化。'
  - title: 'EEG2Video: Towards Decoding Dynamic Visual Perception from EEG Signals'
    group: '上海交大 BCMI Lab + 微软亚洲研究院'
    year: 2024
    tag: 'CN'
    desc: '从静态图像decoding扩展到动态视觉感知。1400段动态视频+20名受试者EEG-video配对数据集。'
  - title: 'EEGPT: Pretrained Transformer for Universal and Reliable Representation of EEG Signals'
    group: '83+ citations'
    year: 2024
    tag: 'CN'
    desc: '10M参数EEG预训练Transformer。spatio-temporal representation alignment预训练目标。'
  - title: 'Visual Decoding and Reconstruction via EEG Embeddings with Guided Diffusion (ATM)'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    year: 2024
    tag: 'CN'
    desc: 'Adaptive Thinking Mapper (ATM) — 即插即用EEG encoder投影到CLIP shared subspace + two-stage diffusion重建。MEG跨模态泛化。'
  - title: 'Con4m: Context-aware Consistency Learning Framework for Segmented Time Series Classification'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    year: 2024
    tag: 'CN'
    desc: '面向SEEG等brain signal分段时间序列的一致性学习。和 DMNet 同时入选 NeurIPS 2024。'
  - title: 'DMNet'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    year: 2024
    tag: 'CN'
    desc: '浙大杨洋组 NeurIPS 2024 双中之一，BrainNet系列扩展。'
  - title: 'seegnificant: Neural Decoding from Stereotactic EEG Across Subjects'
    group: '海外 sEEG跨被试decoding'
    year: 2024
    tag: 'INTL'
    desc: '侵入式EEG跨被试整合。Electrode-wise self-attention + 3D location embedding + 21名受试者联合训练。'
  - title: 'BIOT: Biosignal Transformer for Cross-data Learning in the Wild'
    group: '123+ citations'
    year: 2023
    tag: 'INTL'
    desc: 'EEG/biosignal跨数据集预训练开创性工作。tokenize不同channel/采样率的biosignal成统一"sentences"。后续LaBraM/CBraMod/EEGPT均承袭此路线。'
  - title: 'Brant: Foundation Model for Intracranial Neural Signal'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    year: 2023
    tag: 'CN'
    desc: '国内最早sEEG foundation model之一。500M+参数，1.01TB intracranial数据预训练。'
  - title: 'PPi: Pretraining Brain Signal Model for Patient-independent Seizure Detection'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    year: 2023
    tag: 'CN'
    desc: '和Brant同期同录 NeurIPS 2023——SEEG双自监督任务，跨患者seizure detection。'
  - title: 'DeWave: Discrete EEG Waves Encoding for Brain Dynamics to Text Translation'
    group: 'UTS Sydney (GrapheneX-UTS HAI Centre)'
    year: 2023
    tag: 'Spotlight'
    desc: 'EEG-to-Text直接翻译代表作。Vector-quantized discrete codex，无需eye-tracking marker即可在ZuCo做open-vocabulary翻译。'
  - title: 'MAEEG: Masked Auto-encoder for EEG Representation Learning'
    group: '海外 EEG self-supervised representation learning workshop paper'
    year: 2022
    tag: 'Workshop'
    desc: '最早把 ViT-style masked reconstruction 直接搬到 EEG 上的工作。后续 LaBraM/CBraMod/EEGPT 都受这一思路启发。'

iclr27:
  - title: 'CBraMod: A Criss-Cross Brain Foundation Model for EEG Decoding'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    year: 2025
    tag: 'CN'
    desc: 'criss-cross transformer——空间和时间通过两个并行attention机制分别建模。30s长片段预训练，10个下游任务12个数据集SOTA。'
  - title: 'NeuroLM: A Universal Multi-task Foundation Model for Bridging the Gap between Language and EEG Signals'
    group: '上海交大 BCMI Lab (吕宝粮组) + 微软亚洲研究院'
    year: 2025
    tag: 'CN'
    desc: 'LaBraM延续——把EEG视为foreign language给LLM"看"，多任务+推理统一框架。'
  - title: 'BrainUICL: An Unsupervised Individual Continual Learning Framework for EEG Applications'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    year: 2025
    tag: 'CN'
    desc: '解决"个体持续适应"问题——预训练模型部署新被试时无监督持续校准。'
  - title: 'Animate Your Thoughts (Mind-Animator): Reconstruction of Dynamic Natural Vision from Human Brain Activity'
    group: '中科院自动化所 (何晖光组)'
    year: 2025
    tag: 'CN'
    desc: '动态自然视觉重建——基于脑活动重建视频片段。'
  - title: 'Learning Task Belief Similarity with Latent Dynamics for Meta-Reinforcement Learning'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    year: 2025
    tag: 'CN'
    desc: '不是直接EEG paper但是组内RL方向延伸——meta-RL中task belief相似性学习。'
  - title: 'LaBraM: Large Brain Model for Learning Generic Representations with Tremendous EEG Data in BCI'
    group: '上海交大 BCMI Lab (吕宝粮组)'
    year: 2024
    tag: 'Spotlight'
    desc: '国内 EEG 基础模型标杆。VQ-neural-spectrum-prediction tokenizer + masked EEG modeling + 2500h数据预训练，三档参数(5.8M/46M/369M)清晰scaling law。'
  - title: 'CLIP-MUSED: CLIP-Guided Multi-Subject Visual Neural Information Semantic Decoding'
    group: '中科院自动化所 (何晖光组)'
    year: 2024
    tag: 'CN'
    desc: 'CLIP-引导的跨被试视觉神经语义解码。在fMRI多被试decoding上突破。'

icml27:
  - title: 'EmoGrowth: Incremental Multi-label Emotion Decoding with Augmented Emotional Relation Graph'
    group: '中科院自动化所 (何晖光组)'
    year: 2025
    tag: 'CN'
    desc: '增量多标签情感解码——情感关系图增强的脑信号情感decoding。'
  - title: 'Synthesizing Images on Perceptual Boundaries of ANNs for Uncovering and Manipulating Human Perceptual Variability'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    year: 2025
    tag: 'CN'
    desc: '利用 ANN perceptual boundaries 合成图像探测 human perceptual variability，神经科学+AI 融合方向代表。'

aaai27:
  - title: 'Multi-to-Single: Reducing Multimodal Dependency in Emotion Recognition Through Contrastive Learning'
    group: '上海交大 BCMI Lab (吕宝粮组)'
    year: 2025
    tag: 'CN'
    desc: '通过 contrastive learning 把训练时多模态依赖降为推理时单模态——降低部署成本。'
  - title: 'Personalized Sleep Staging Leveraging Source-Free Unsupervised Domain Adaptation'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    year: 2025
    tag: 'CN'
    desc: 'EEG睡眠分期个性化适应。Source-free UDA——目标域适应时无需访问源域数据。'
  - title: 'Generalizable Sleep Staging via Multi-level Domain Alignment'
    group: '浙江大学脑机智能国家重点实验室 (潘纲组)'
    year: 2024
    tag: 'CN'
    desc: '多层级domain alignment用于跨数据集睡眠分期泛化。CCF-A录用，CBraMod前作。'
  - title: 'BrainVis: Exploring the Bridge between Brain and Visual Signals via Image Reconstruction'
    group: '香港科技大学（广州）+ 南洋理工 (Hao Wang组)'
    year: 2024
    tag: 'CN'
    desc: 'EEG → image reconstruction。Time/frequency-domain feature + CLIP coarse+fine-grained semantic插值对齐 + cascaded diffusion。仅10%训练数据即超SOTA。'
  - title: 'Plug-and-play Domain Adaptation for Cross-subject EEG-based Emotion Recognition'
    group: '上海交大 BCMI Lab (吕宝粮组)'
    year: 2021
    tag: 'CN'
    desc: '即插即用domain adaptation，2021年AAAI——跨被试EEG情感识别的标志性工作之一。'

ijcai27:
  - title: 'CoCoG: Controllable Visual Stimuli Generation Based on Human Concept Representations'
    group: '南方科技大学 NCC Lab (刘泉影组)'
    year: 2024
    tag: 'CN'
    desc: '基于human concept表征的可控视觉刺激生成——为脑活动decoding研究服务的视觉刺激控制工具。'
  - title: 'Mirror Contrastive Loss + Sliding Window Transformer for MI'
    group: 'IJCAI 2024 Jeju, HBAI Workshop'
    year: 2024
    tag: 'Workshop'
    desc: 'Subject-independent MI分类，BCI Competition IV 2a/2b验证。HBAI workshop是IJCAI上BCI主题主要聚集地。'

kdd27:
  - title: 'Brant-X: A Unified Physiological Signal Alignment Framework'
    group: '杨洋组/浙江大学 (Daoze Zhang, Zhizhang Yuan, Junru Chen, Kerui Chen, Yang Yang)'
    year: 2024
    tag: 'CN'
    desc: '基于EEG基础模型Brant-2(4TB数据/1B参数)做EEG与其他生理信号(EXG)的统一对齐框架,用海量EEG表示赋能稀缺的同步多模态生理信号表示学习。'
  - title: 'MBrain: A Multi-channel Self-Supervised Learning Framework for Brain Signals'
    group: '杨洋组/浙江大学 (Donghong Cai, Junru Chen, Yang Yang 等)'
    year: 2023
    tag: 'CN'
    desc: '多通道自监督学习框架,用多通道CPC学习脑区间空间相关性、延时位移预测任务捕捉时间相关性,在EEG/sEEG大规模真实癫痫数据上做发作检测并可跨病人迁移。'
  - title: 'BrainNet: Epileptic Wave Detection from SEEG with Hierarchical Graph Diffusion Learning'
    group: '浙大 ZJU-BrainNet (杨洋组)'
    year: 2022
    tag: 'CN'
