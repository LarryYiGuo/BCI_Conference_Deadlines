# BCI Conference Deadlines · 数据文件
# ─────────────────────────────────────────────────────────────
# 字段说明:
#   id                 唯一标识(小写+届次)
#   title / year       会议简称 / 届次年份
#   full_name          会议全名
#   link               官网 URL
#   deadline           全文截稿 'YYYY-MM-DD HH:MM',未公布写 TBD
#   abstract_deadline  摘要/注册截稿(可选)
#   tz                 截稿时区的 UTC 偏移,AoE = '-12:00'
#   tz_label           时区显示文字
#   date / place       会议日期 / 举办地
#   sub                分类: ML | DM | NC | CV | AC | SP | BME | BCI
#   rank               CCF 等级,非 CCF 目录写 '非CCF'
#   estimated          true = 官方未公布,按往年规律推测
#   friendly           true = 硕士毕业友好(来自 venue 清单标注)
#   bci                BCI 相关性一句话
#   note               备注
# ─────────────────────────────────────────────────────────────
# 分类说明(按学科方向重新分类,替代原 Tier 影响力分级):
#   ML  机器学习·AI 综合     DM  数据挖掘·信息检索
#   NC  神经计算·神经网络     CV  计算机视觉·多媒体
#   AC  情感计算·多模态交互   SP  信号处理
#   BME 医工·生物医学影像     BCI 神经工程·BCI·神经科学
# ─────────────────────────────────────────────────────────────

